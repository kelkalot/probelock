name: "probelock gate"
description: "Fail a PR when a model/quant/runtime swap regresses local-model capabilities."
branding:
  icon: "shield"
  color: "purple"

inputs:
  tools:
    description: "Path to the OpenAI-style tools JSON."
    required: true
  baseline:
    description: "Committed baseline lockfile to gate against."
    required: true
  endpoint:
    description: "OpenAI-compatible base URL (e.g. http://host:11434/v1)."
    required: true
  model:
    description: "Model id to probe."
    required: true
  samples:
    description: "Samples per probe (raise with temperature for variance)."
    required: false
    default: "5"
  temperature:
    description: "Sampling temperature."
    required: false
    default: "0.7"
  max-drop:
    description: "Regression threshold."
    required: false
    default: "0.05"
  confidence:
    description: "Only fail on drops significant at this confidence."
    required: false
    default: "0.95"

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
    - shell: bash
      # Inputs are passed through env: and referenced as shell variables below, not
      # interpolated directly into the script via ${{ }} — GitHub Actions expression
      # substitution happens as literal text replacement before bash ever parses this
      # script, so splicing an untrusted input value in directly would let shell
      # metacharacters in that value execute as arbitrary commands in the runner.
      # Uses the published `probelock` from PyPI, constrained to the 1.x line so this
      # `@v1` Action never silently pulls a future 2.x across the SemVer major boundary
      # (where the lockfile format / scoring may change — see STABILITY.md). To pin an
      # unreleased revision, replace `uvx 'probelock>=1,<2'` with
      #   `uvx --from git+https://github.com/kelkalot/probelock probelock`.
      run: |
        uvx 'probelock>=1,<2' probe \
          --tools "$PROBELOCK_TOOLS" \
          --endpoint "$PROBELOCK_ENDPOINT" \
          --model "$PROBELOCK_MODEL" \
          --samples "$PROBELOCK_SAMPLES" \
          --temperature "$PROBELOCK_TEMPERATURE" \
          -o candidate.lock
        uvx 'probelock>=1,<2' gate \
          --baseline "$PROBELOCK_BASELINE" \
          --candidate candidate.lock \
          --max-drop "$PROBELOCK_MAX_DROP" \
          --confidence "$PROBELOCK_CONFIDENCE"
      env:
        PROBELOCK_TOOLS: ${{ inputs.tools }}
        PROBELOCK_ENDPOINT: ${{ inputs.endpoint }}
        PROBELOCK_MODEL: ${{ inputs.model }}
        PROBELOCK_SAMPLES: ${{ inputs.samples }}
        PROBELOCK_TEMPERATURE: ${{ inputs.temperature }}
        PROBELOCK_BASELINE: ${{ inputs.baseline }}
        PROBELOCK_MAX_DROP: ${{ inputs.max-drop }}
        PROBELOCK_CONFIDENCE: ${{ inputs.confidence }}
