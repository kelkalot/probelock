name: release

# Publish to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
# One-time setup on PyPI: add a "pending publisher" for project `probelock`
# (owner: kelkalot, repository: probelock, workflow: release.yml).
# Then push a tag like `v0.1.0` (or run this workflow manually) to publish.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # actions/checkout needs this for a private repo
                       # (declaring any permission defaults all others to `none`)
      id-token: write  # required to mint the OIDC token for Trusted Publishing
    steps:
      # Pinned to commit SHAs, not mutable tags/branches: this job holds id-token: write
      # to mint the PyPI OIDC token, so a retargeted tag upstream would run unreviewed
      # code with publish access to the `probelock` project. Bump deliberately.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      # `uv publish` instead of pypa/gh-action-pypi-publish: that action is a Docker
      # container action whose ghcr image is pulled by the *git ref it's pinned to*,
      # and pypa prunes old SHA-tagged images — the v0.2.0 release failed with
      # "manifest unknown" on a SHA pin that had worked three days earlier. uv is
      # already in this job (SHA-pinned above) and speaks Trusted Publishing natively,
      # so publishing needs no third-party action at all. `--trusted-publishing always`
      # fails loudly if the OIDC token is unavailable instead of falling back to
      # token auth.
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
