name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Tests
        run: uv run --with pytest pytest -q
      - name: Lint
        run: uv run --with ruff ruff check .
